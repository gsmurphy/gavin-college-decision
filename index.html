<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gavin's College Decision · 2026 (Landscape v3)</title>
<style>
  :root {
    --paper: #eee5cf;
    --paper-warm: #efe0bb;
    --ink: #231F20;
    --muted: #7a6b52;
    --ocean: #f3ead0;
    --ink-dark: #3a2a1a;

    --st-andrews: #0065BD;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', 'Garamond', serif;
    background: linear-gradient(135deg, #d8c9ad 0%, #bba98b 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    color: var(--ink);
  }

  .scene {
    width: 100%;
    max-width: 1000px;
    perspective: 2400px;
  }

  .card {
    width: 100%;
    aspect-ratio: 9 / 6;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(0.4, 0.0, 0.2, 1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: var(--paper);
    box-shadow: 0 30px 60px -15px rgba(0,0,0,0.3),
                0 10px 20px -10px rgba(0,0,0,0.15);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 8px;  /* beige inset border around everything on the card */
  }
  .face.back { transform: rotateY(180deg); }

  /* FRONT — v2: map centered with even border, title moved INTO the ocean */
  .map-container {
    flex: 1 1 auto;
    padding: 18px;  /* combined with face padding 8 = 26px border on all sides */
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  .map-svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .cta {
    font-size: 10px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--muted);
    animation: pulse-hint 3s ease-in-out infinite;
  }
  @keyframes pulse-hint {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 1; }
  }

  /* BACK — landscape layout: title strip on top + 3x3 photo grid below */
  .back {
    padding: 14px 18px 18px;
    display: grid !important;  /* override flex-column from .face */
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: auto 1fr 1.55fr 1.4fr;  /* bottom row taller to host party info */
    gap: 6px;
    background:
      radial-gradient(ellipse at center, rgba(0,101,189,0.05) 0%, transparent 70%),
      linear-gradient(150deg, var(--paper) 0%, var(--paper-warm) 100%);
  }
  .back-title-strip {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 2px 12px 8px;
  }
  .back-title-strip .preamble {
    font-size: 20px;
    font-style: italic;
    font-family: 'Palatino', 'Palatino Linotype', 'Book Antiqua', Georgia, serif;
    color: #00539B;
    letter-spacing: 0.03em;
    line-height: 1.1;
  }
  .back-title-strip h2 {
    font-size: 34px;
    font-weight: 400;
    margin: 0;
    color: #00539B;
    font-family: 'Palatino', 'Palatino Linotype', 'Book Antiqua', Georgia, serif;
    letter-spacing: 0.02em;
    text-align: center;
    line-height: 1.1;
    white-space: nowrap;
  }
  .back-cell {
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid rgba(0, 0, 0, 0.18);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    background: var(--paper);
  }
  .back-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .back-cell.cell-contain img {
    object-fit: contain;
    background: var(--paper);
  }
  .back-cell.cell-zoom-shield img {
    object-position: center 65%;  /* shift crop down so more of the shield's bottom is visible */
    transform: translateY(-15px) scale(1.6);
    transform-origin: center 60%;
  }
  .cell-hero {
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  }
  .cell-logo {
    border: none;
    box-shadow: none;
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6px;
  }
  .cell-text {
    /* Subtle inset treatment so the text block reads as a deliberate plaque
       within the grid rather than an empty-space gap between photos. */
    background: rgba(0, 0, 0, 0.035);
    border: 1px solid rgba(0, 0, 0, 0.14);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6px;
  }
  /* (cell-logo styles removed — shield photo is now a regular photo cell and
       the title lives in the full-width strip across the top of the back) */
  .cell-text {
    font-family: 'Palatino', 'Palatino Linotype', 'Book Antiqua', Georgia, serif;
    line-height: 1.3;
    gap: 4px;
    padding: 8px 4px;
  }
  .cell-text .line {
    font-size: 20px;
    line-height: 1.25;
    color: #00539B;  /* St Andrews blue for all body text */
  }
  .cell-text .line-founded {
    font-style: italic;
  }
  .cell-text .line-class {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 0.01em;
    margin: 4px 0;
  }
  .cell-text .line-divider {
    /* Thin horizontal rule between St Andrews info and party info */
    width: 60%;
    height: 1px;
    background: rgba(0, 83, 155, 0.25);
    margin: 8px 0 4px;
  }
  .cell-text .line-party {
    font-size: 16px;
    font-weight: 600;
    color: #b32028;  /* warm celebratory red */
    letter-spacing: 0.01em;
  }
  .cell-text .line-rsvp {
    font-size: 13px;
    color: #00539B;
    letter-spacing: 0.01em;
    margin-top: 6px;
  }
  .cell-text .line-rsvp a {
    color: inherit;
    text-decoration: underline;
    text-decoration-thickness: 0.5px;
    text-underline-offset: 2px;
  }
  .cell-text .line-rsvp a:hover {
    color: #003a6c;
  }
  .cell-placeholder {
    background:
      repeating-linear-gradient(45deg,
        rgba(0,101,189,0.10) 0 6px,
        rgba(0,101,189,0.04) 6px 12px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    font-style: italic;
    text-align: center;
    line-height: 1.4;
  }
  .photo-trio .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .photo-trio .placeholder-photo {
    background:
      repeating-linear-gradient(45deg,
        rgba(0,101,189,0.10) 0 6px,
        rgba(0,101,189,0.04) 6px 12px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    font-style: italic;
    text-align: center;
    line-height: 1.4;
  }
  .facts-line {
    font-size: 11px;
    text-align: center;
    color: var(--ink);
    line-height: 1.55;
    margin-bottom: 12px;
    font-family: 'Georgia', serif;
  }
  .facts-line em {
    font-style: italic;
    color: var(--st-andrews);
    font-weight: normal;
  }
  .back-title {
    text-align: center;
    font-size: clamp(22px, 3.2vw, 28px);
    font-weight: 400;
    margin: 0 0 4px;
    line-height: 1.1;
    color: var(--st-andrews);
  }
  .back-subtitle {
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .divider {
    width: 60px; height: 1px; background: var(--muted);
    margin: 0 auto 22px; opacity: 0.4;
  }
  .facts {
    list-style: none; padding: 0; margin: 0 0 26px;
    text-align: center;
  }
  .facts li { font-size: 13px; padding: 4px 0; line-height: 1.5; }
  .facts li em { font-style: italic; color: var(--st-andrews); }
  .details {
    background: rgba(0, 101, 189, 0.06);
    border-left: 3px solid var(--st-andrews);
    padding: 14px 18px; margin-bottom: 12px;
  }
  .detail-row {
    display: flex; justify-content: space-between;
    align-items: baseline; gap: 16px; padding: 4px 0;
  }
  .detail-label {
    font-size: 9px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--muted); flex-shrink: 0;
  }
  .detail-value { font-size: 13px; text-align: right; color: var(--ink); }
  .placeholder { color: var(--muted); font-style: italic; opacity: 0.7; }
  .back-footer {
    margin-top: auto; padding-top: 18px; text-align: center;
    font-size: 10px; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--muted);
  }

  /* SVG emblem base */
  .emblem-label {
    font-family: 'Georgia', serif;
    font-weight: bold;
  }
</style>
</head>

            <path d="M 59 395

              <circle cx="180" cy="218" r="6.5" fill="#eee5cf" stroke="#00539B" stroke-width="0.7" opacity="0.95"/>
              <circle cx="180" cy="218" r="4.6" fill="#00539B"/>
              <circle cx="180" cy="218" r="1.4" fill="#ffffff" opacity="0.9"/>
              <text x="169" y="221"

                    font-size="11" font-style="italic" font-weight="600"
                    fill="#00539B">HS Grad</text>

          </g>

        </svg>
      </div>

    </div>

<script>
  const card = document.getElementById('card');
  card.addEventListener('click', () => card.classList.toggle('flipped'));
  card.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      card.classList.toggle('flipped');
    }
  });
